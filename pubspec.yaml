name: trace_bench_viewer
description: TraceBench read-only Project ZIP viewer shell.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ^3.6.0
  file_picker: ^8.1.0
  path_provider: ^2.1.0
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  flutter_markdown: ^0.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3
  path: ^1.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/samples/pelle_pv20_minimal/
    - assets/samples/pelle_pv20_minimal/exports/
